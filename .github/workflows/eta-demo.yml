name: Refresh ETA demo

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/eta-demo-script.sh'
      - 'scripts/render-eta-demo-cast.mjs'
      - 'scripts/build-eta-gif.sh'
      - '.github/workflows/eta-demo.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/eta-demo-script.sh'
      - 'scripts/render-eta-demo-cast.mjs'
      - 'scripts/build-eta-gif.sh'
      - '.github/workflows/eta-demo.yml'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Rebuild ETA demo assets
        run: ./scripts/build-eta-gif.sh

      - name: Ensure generated assets exist
        run: test -s docs/eta-demo.cast && test -s docs/eta-demo.gif && test -s docs/eta-demo.mp4

      - name: Fail if deterministic cast output changed
        run: git diff --exit-code -- docs/eta-demo.cast

  refresh:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Rebuild ETA demo assets
        run: ./scripts/build-eta-gif.sh

      - name: Create asset refresh PR when outputs drift
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: refresh ETA demo assets"
          title: "docs: refresh ETA demo assets"
          body: |
            Automated refresh of ETA demo assets generated by `.github/workflows/eta-demo.yml`.
          branch: automation/refresh-eta-demo-assets
          delete-branch: true
          add-paths: |
            docs/eta-demo.cast
            docs/eta-demo.gif
            docs/eta-demo.mp4
