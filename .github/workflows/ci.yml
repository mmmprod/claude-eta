name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check

  supabase-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Supabase schema validation
        run: npm run test:integration

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Hook performance gate
        env:
          ETA_PERF_SAMPLES: 20
          ETA_HOOK_TOTAL_AVG_MS: 180
          ETA_HOOK_TOTAL_P95_MS: 220
          ETA_HOOK_DELTA_AVG_MS: 90
          ETA_HOOK_DELTA_P95_MS: 120
        run: npm run test:perf

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Check for known vulnerable packages
        run: npx --yes audit-ci --high

  required-ci:
    name: required-ci
    if: ${{ always() }}
    needs:
      - build-and-test
      - supabase-integration
      - perf
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Assert required jobs passed
        env:
          BUILD_AND_TEST_RESULT: ${{ needs.build-and-test.result }}
          SUPABASE_INTEGRATION_RESULT: ${{ needs.supabase-integration.result }}
          PERF_RESULT: ${{ needs.perf.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          if [ "$BUILD_AND_TEST_RESULT" != "success" ] || [ "$SUPABASE_INTEGRATION_RESULT" != "success" ] || [ "$PERF_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "build-and-test result: $BUILD_AND_TEST_RESULT"
            echo "supabase-integration result: $SUPABASE_INTEGRATION_RESULT"
            echo "perf result: $PERF_RESULT"
            echo "security result: $SECURITY_RESULT"
            exit 1
          fi
