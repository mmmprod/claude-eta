name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Check for known vulnerable packages
        run: npx --yes audit-ci --high

  required-ci:
    name: required-ci
    if: ${{ always() }}
    needs:
      - build-and-test
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Assert required jobs passed
        env:
          BUILD_AND_TEST_RESULT: ${{ needs.build-and-test.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          if [ "$BUILD_AND_TEST_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "build-and-test result: $BUILD_AND_TEST_RESULT"
            echo "security result: $SECURITY_RESULT"
            exit 1
          fi
