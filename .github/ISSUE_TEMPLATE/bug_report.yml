name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! The more detail you give, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: claude-eta version
      description: "Run `claude plugin list` and paste the version"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: "Run `claude --version`"
      placeholder: "2.0.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows (WSL)
        - Windows (native)
        - Linux
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include error messages if any.
      placeholder: "When I run /eta, I get..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected to see my session stats..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Install claude-eta
        2. Run a few tasks
        3. Type /eta
        4. See error
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output or screenshots
      render: shell
    validations:
      required: false
