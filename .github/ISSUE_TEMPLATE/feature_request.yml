name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case
      placeholder: "I often find myself wanting to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like?
      description: Describe your ideal solution
      placeholder: "It would be great if claude-eta could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches?
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Which layer does this relate to?
      description: See the Architecture section in the README
      options:
        - "Layer 0 — Feedback Loop (data collection)"
        - "Layer 1 — Static Estimation (pre-task estimates)"
        - "Layer 2 — Live Refinement (in-progress ETA)"
        - "Layer 3 — Collective Intelligence (community data)"
        - "Bullshit Detector"
        - "/eta CLI output"
        - "Other / Not sure"
    validations:
      required: false
